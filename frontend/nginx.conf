# 应用：前端静态 + /api 反代后端
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA：history 路由回退 index.html(router 用 createWebHistory)
        try_files $uri $uri/ /index.html;
    }

    # /api 原样反代后端(保留 /api 前缀，镜像 dev 的 Vite 代理)
    location /api/ {
        # 放宽上传请求体上限：音乐上传走 /api，nginx 默认仅 1MB 会直接 413 打回。
        # 此处须 ≥ 后端 spring.servlet.multipart(见 application.yml)，否则请求到不了后端。
        client_max_body_size 100m;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# MinIO 直透：浏览器拿封面直链 + 音频预签名 URL 都打这里
server {
    listen 9000;
    server_name _;

    client_max_body_size 100m;

    location / {
        proxy_pass http://minio:9000;
        # 关键：用 $http_host 原样转发 Host(含端口)，使预签名 SigV4 校验通过
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }
}
