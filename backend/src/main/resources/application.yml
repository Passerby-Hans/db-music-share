server:
  port: 8080

spring:
  application:
    name: music-share-backend

  # PostgreSQL (对应 docker-compose.dev.yml)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/music_share
    username: music
    password: music123

  # Redis (映射在 6380，避开本机已占用的 6379)
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 3000ms

  # 文件上传体积上限(支持无损 flac 等大文件，单文件放宽到 100MB)
  # 注意：发行版 nginx /api 转发处 client_max_body_size 须 ≥ 此值，否则被 nginx 先 413 打回
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

# 对象存储(MinIO)
storage:
  minio:
    endpoint: http://localhost:9000
    access-key: music
    secret-key: music123456
    # 音频私有桶(走预签名 URL) / 封面公开桶(直链)
    audio-bucket: music-audio
    cover-bucket: music-cover
    # 音频预签名 URL 有效期(秒)，默认 2 小时
    presigned-expiry-seconds: 7200
    # 封面直链对外基址(浏览器可访问的 MinIO 地址；与 endpoint 同源)
    public-base-url: http://localhost:9000
    # presign 对外端点(浏览器可达的 MinIO 地址)；空白回退 endpoint。
    # dev 与 endpoint 同址(行为不变)；容器部署由 STORAGE_MINIO_PUBLIC_ENDPOINT 覆盖
    public-endpoint: http://localhost:9000
    # 孤儿文件扫描：安全期(分钟，保护刚上传未建歌的文件) 与 定时清理 cron
    orphan-safe-minutes: 120
    orphan-cron: "0 30 4 * * *"

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：与数据库 IDENTITY 自增对齐
      id-type: auto

# Actuator：暴露健康检查端点
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
